version: '3.8'

services:

  app:
    build: .

    ports:
      - "5000:5000"

    environment:
      MYSQLHOST: mysql
      MYSQLUSER: root
      MYSQLPASSWORD: root
      MYSQLDATABASE: db_tubes
      MYSQLPORT: 3306

    depends_on:
      - mysql

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_tubes

    ports:
      - "3307:3306"